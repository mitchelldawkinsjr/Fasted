name: Deploy to production VPS

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "public/**"
      - "assets/**"
      - "deploy/**"
      - "scripts/**"
      - "docker/**"
      - "index.html"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "tsconfig*.json"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:

jobs:
  secrets-check:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check VPS secrets
        id: check
        run: |
          if [ -n "${{ secrets.VPS_SSH_KEY }}" ] && [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_USER }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when secrets are missing
        if: steps.check.outputs.configured != 'true' && github.event_name == 'push'
        run: |
          echo "::warning::VPS deploy skipped. Add repository secrets VPS_SSH_KEY, VPS_HOST, and VPS_USER (same values as your other deployed repos), then re-run Deploy to production VPS from Actions."

  secrets-required:
    needs: secrets-check
    if: needs.secrets-check.outputs.configured != 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Fail — VPS secrets not configured
        run: |
          echo "::error::Add VPS_SSH_KEY, VPS_HOST, and VPS_USER under Settings → Secrets and variables → Actions."
          echo "Use the same values as your other deployed repositories, then re-run this workflow."
          exit 1

  deploy:
    name: Deploy Fasted Calendar to production VPS
    needs: secrets-check
    if: needs.secrets-check.outputs.configured == 'true'
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          VPS_REMOTE="${VPS_USER}@${VPS_HOST}" bash scripts/deploy-vps.sh

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Fasted Calendar deployed successfully to production VPS\"}" \
            "$SLACK_WEBHOOK"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Fasted Calendar deployment to production VPS failed\"}" \
            "$SLACK_WEBHOOK"
