name: Deploy to VPS

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "public/**"
      - "assets/**"
      - "deploy/**"
      - "supabase/migrations/**"
      - "scripts/**"
      - "docker/**"
      - "index.html"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "tsconfig*.json"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:

jobs:
  test:
    name: Pre-deploy tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        env:
          CI: true
        run: npx playwright test e2e/journal.spec.ts e2e/check-in-streak.spec.ts

  secrets-check:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check VPS secrets
        id: check
        run: |
          if [ -n "${{ secrets.VPS_SSH_KEY }}" ] && [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_USER }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when secrets are missing
        if: steps.check.outputs.configured != 'true' && github.event_name == 'push'
        run: |
          echo "::warning::VPS deploy skipped. Add repository secrets VPS_SSH_KEY, VPS_HOST, and VPS_USER, then re-run this workflow from Actions."

  secrets-required:
    needs: secrets-check
    if: needs.secrets-check.outputs.configured != 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Fail — VPS secrets not configured
        run: |
          echo "::error::Add VPS_SSH_KEY, VPS_HOST, and VPS_USER under Settings → Secrets and variables → Actions."
          exit 1

  deploy:
    name: Deploy Fasted Calendar
    needs: [test, secrets-check]
    if: needs.secrets-check.outputs.configured == 'true'
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          set -euo pipefail
          HOST="${{ secrets.VPS_HOST }}"
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 20 -H "$HOST" >> ~/.ssh/known_hosts 2>/tmp/ssh-keyscan.err; then
              echo "ssh-keyscan succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "ssh-keyscan attempt ${attempt} failed:"
            cat /tmp/ssh-keyscan.err || true
            sleep $((attempt * 3))
          done
          echo "::error::ssh-keyscan failed after retries for ${HOST}"
          exit 1

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          SUPABASE_DIR: ${{ vars.SUPABASE_DIR }}
          DOCKER_NETWORK: ${{ vars.DOCKER_NETWORK }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
        run: |
          VPS_REMOTE="${VPS_USER}@${VPS_HOST}" bash scripts/deploy-vps.sh

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Fasted Calendar deployed successfully\"}" \
            "$SLACK_WEBHOOK"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Fasted Calendar deployment failed\"}" \
            "$SLACK_WEBHOOK"
