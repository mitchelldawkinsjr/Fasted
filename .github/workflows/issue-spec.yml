name: Issue Auto-Spec

on:
  issues:
    types: [labeled]

concurrency:
  # Include label so unrelated labeled events do not block or cancel this workflow.
  group: ${{ github.workflow }}-${{ github.event.issue.number }}-${{ github.event.label.name }}
  cancel-in-progress: false

jobs:
  generate-spec:
    if: github.event.label.name == 'needs-spec'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    outputs:
      dispatch_implement: ${{ steps.spec.outputs.dispatch_implement }}
      dispatch_implement_after_arch: ${{ steps.arch.outputs.dispatch_implement }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check OpenAI secret
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "::error::OPENAI_API_KEY secret is not configured."
            exit 1
          fi

      - name: Generate spec and auto-queue
        id: spec
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          AGENT_AUTO_READY_ENABLED: ${{ vars.AGENT_AUTO_READY_ENABLED }}
        run: |
          set -euo pipefail
          chmod +x scripts/generate-issue-spec.sh
          RESULT=$(scripts/generate-issue-spec.sh | tail -1)
          if [ "$RESULT" = "dispatch_implement=true" ]; then
            echo "dispatch_implement=true" >> "$GITHUB_OUTPUT"
          else
            echo "dispatch_implement=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate architecture review for complex issues
        id: arch
        if: steps.spec.outputs.dispatch_implement != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels -q '[.labels[].name] | join(",")')
          if echo "$LABELS" | grep -q 'needs-architecture'; then
            chmod +x scripts/generate-architecture-review.sh
            RESULT=$(scripts/generate-architecture-review.sh | tail -1)
            if [ "$RESULT" = "dispatch_implement=true" ]; then
              echo "dispatch_implement=true" >> "$GITHUB_OUTPUT"
            else
              echo "dispatch_implement=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "dispatch_implement=false" >> "$GITHUB_OUTPUT"
          fi

  dispatch-implement:
    needs: generate-spec
    if: needs.generate-spec.outputs.dispatch_implement == 'true' || needs.generate-spec.outputs.dispatch_implement_after_arch == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dispatch Cursor cloud agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/run-issue-implement.sh
          scripts/run-issue-implement.sh
