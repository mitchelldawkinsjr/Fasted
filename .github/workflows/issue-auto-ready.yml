name: Issue Auto-Ready

# After architecture review completes, queue implementation in the same workflow.
# Bot-added labels do not trigger downstream workflows (GITHUB_TOKEN restriction).

on:
  issues:
    types: [labeled]

jobs:
  queue-implement:
    if: github.event.label.name == 'architecture-reviewed'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add ready label and dispatch implement
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail

          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels -q '[.labels[].name] | join(",")')

          if echo "$LABELS" | grep -qE 'no-agent|agent-manual'; then
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Architecture review complete. Add \`ready\` when you want implementation to start."
            exit 0
          fi

          if echo "$LABELS" | grep -qE 'agent-working|pr-opened'; then
            echo "Already in progress."
            exit 0
          fi

          if ! echo "$LABELS" | grep -q 'ready'; then
            gh label create ready --description "Trigger Cursor cloud agent implementation" --color "FBCA04" 2>/dev/null || true
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label ready
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "🏗️ Architecture reviewed — implementation agent starting."
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dispatch Cursor cloud agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/run-issue-implement.sh
          scripts/run-issue-implement.sh
