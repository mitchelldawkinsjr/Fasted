name: Issue Architecture Review

# Posts architecture review from CI (reliable gh comment), then chains implement.
# Bot-added labels do not trigger downstream workflows.

on:
  issues:
    types: [labeled]

concurrency:
  group: cursor-implement-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  architecture-review:
    if: github.event.label.name == 'needs-architecture'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    outputs:
      dispatch_implement: ${{ steps.arch.outputs.dispatch_implement }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check OpenAI secret
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "::error::OPENAI_API_KEY secret is not configured."
            exit 1
          fi

      - name: Generate architecture review
        id: arch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          chmod +x scripts/generate-architecture-review.sh
          RESULT=$(scripts/generate-architecture-review.sh | tail -1)
          if [ "$RESULT" = "dispatch_implement=true" ]; then
            echo "dispatch_implement=true" >> "$GITHUB_OUTPUT"
          else
            echo "dispatch_implement=false" >> "$GITHUB_OUTPUT"
          fi

  dispatch-implement:
    needs: architecture-review
    if: needs.architecture-review.outputs.dispatch_implement == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dispatch Cursor cloud agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/run-issue-implement.sh
          scripts/run-issue-implement.sh
