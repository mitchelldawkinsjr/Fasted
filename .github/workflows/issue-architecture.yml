name: Issue Architecture Review

on:
  issues:
    types: [labeled]

jobs:
  architecture-review:
    if: github.event.label.name == 'needs-architecture'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CURSOR_API_KEY
        run: |
          if [ -z "${{ secrets.CURSOR_API_KEY }}" ]; then
            echo "::error::CURSOR_API_KEY secret is not configured."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dispatch architecture agent
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/dispatch-architecture-agent.mjs

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh label create needs-architecture --description "Request architecture review before implementation" --color "C5DEF5" 2>/dev/null || true
          gh label create architecture-reviewed --description "Architecture review posted" --color "0E8A16" 2>/dev/null || true
