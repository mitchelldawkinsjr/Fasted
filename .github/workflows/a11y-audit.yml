name: Accessibility Audit

# Manual a11y-only rerun. Required PR gating lives in ci.yml (Issue #65).
on:
  workflow_dispatch:

jobs:
  a11y:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: a11y-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install app dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Build app
        working-directory: ${{ github.workspace }}
        run: npm run build

      - name: Install audit dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        working-directory: ${{ github.workspace }}
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/ && break
            sleep 2
          done
          curl -sf http://127.0.0.1:4173/ >/dev/null

      - name: Run axe accessibility audit
        env:
          A11Y_BASE_URL: http://127.0.0.1:4173
        run: node audit.mjs --after

      - name: Run Playwright accessibility tests
        env:
          A11Y_BASE_URL: http://127.0.0.1:4173
        run: npx playwright test

      - name: Upload audit reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-reports-${{ github.run_id }}
          retention-days: 3
          path: |
            a11y-audit/summary-*.json
            a11y-audit/report-*.json
            a11y-audit/report-*.md
