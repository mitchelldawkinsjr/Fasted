name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production npm dependencies
        # Fail the job on high/critical issues in runtime deps (omit dev tooling).
        run: npm audit --omit=dev --audit-level=high

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block committed secrets and sensitive artifacts
        run: |
          set -e
          patterns='(^|/)\.env$|\.env\.(local|prod|production|staging|development)$|\.pem$|\.key$|\.db$|pocketbase-backup/'
          if git ls-files | grep -E "$patterns"; then
            echo "ERROR: Sensitive or backup files are tracked in git."
            exit 1
          fi
          echo "No blocked secret patterns found in tracked files."
