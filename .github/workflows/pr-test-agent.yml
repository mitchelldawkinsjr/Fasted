name: PR Testing Agent

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**"
      - "e2e/**"
      - "supabase/**"

jobs:
  test-agent-advisory:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post testing agent advisory
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/pr-test-agent-check.mjs
