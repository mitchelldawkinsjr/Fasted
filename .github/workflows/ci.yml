name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify screenshot artifacts are compressed
        run: npm run compress:artifacts:check

      - name: Build
        run: npm run build

      # Issue #65: keep accessibility checks in the required CI workflow so PR
      # status reflects WCAG compliance and publishes axe report artifacts.
      - name: Install accessibility audit dependencies
        working-directory: a11y-audit
        run: npm ci

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps chromium
          npm --prefix a11y-audit exec -- playwright install chromium

      - name: Run Playwright e2e tests
        env:
          CI: true
        run: npx playwright test e2e/journal.spec.ts e2e/check-in-streak.spec.ts

      - name: Run accessibility checks
        env:
          A11Y_BASE_URL: http://127.0.0.1:4173
          CI: true
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT

          for i in $(seq 1 30); do
            if curl -sf "$A11Y_BASE_URL" >/dev/null; then
              npm --prefix a11y-audit run audit:after
              npm --prefix a11y-audit run test:a11y
              exit 0
            fi
            sleep 2
          done

          echo "Preview server did not become ready at $A11Y_BASE_URL"
          exit 1

      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-reports
          path: |
            a11y-audit/summary-*.json
            a11y-audit/report-*.json
            a11y-audit/report-*.md

      - name: Run overflow audit (advisory)
        continue-on-error: true
        env:
          CI: true
        run: npx playwright test e2e/overflow-audit.spec.ts

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Docker-related changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            docker:
              - Dockerfile
              - docker-compose.prod.yml
              - deploy/**

      - name: Skip Docker build (no relevant changes on PR)
        if: github.event_name == 'pull_request' && steps.changes.outputs.docker != 'true'
        run: echo "No Docker-related file changes on this PR."

      - name: Set up Docker Buildx
        if: github.event_name == 'push' || steps.changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        if: github.event_name == 'push' || steps.changes.outputs.docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: fasted-calendar:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=https://ci.example.invalid
            VITE_SUPABASE_ANON_KEY=ci-placeholder-not-for-production
