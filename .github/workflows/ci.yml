name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        env:
          CI: true
        run: npx playwright test e2e/journal.spec.ts e2e/check-in-streak.spec.ts

      - name: Run overflow audit (advisory)
        continue-on-error: true
        env:
          CI: true
        run: npx playwright test e2e/overflow-audit.spec.ts

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Docker-related changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            docker:
              - Dockerfile
              - docker-compose.prod.yml
              - deploy/**

      - name: Skip Docker build (no relevant changes on PR)
        if: github.event_name == 'pull_request' && steps.changes.outputs.docker != 'true'
        run: echo "No Docker-related file changes on this PR."

      - name: Set up Docker Buildx
        if: github.event_name == 'push' || steps.changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        if: github.event_name == 'push' || steps.changes.outputs.docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: fasted-calendar:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=https://ci.example.invalid
            VITE_SUPABASE_ANON_KEY=ci-placeholder-not-for-production
