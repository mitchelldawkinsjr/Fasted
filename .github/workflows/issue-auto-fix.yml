name: Issue Auto-Fix

# One automatic fix pass when reviews report findings.
# Disable: vars.AGENT_AUTO_FIX_ENABLED=false
# Manual retry: remove auto-fix-attempted and re-add review-findings, or comment /agent on the PR.

on:
  issues:
    types: [labeled]

jobs:
  auto-fix:
    if: |
      github.event.label.name == 'review-findings' &&
      vars.AGENT_AUTO_FIX_ENABLED != 'false'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard and resolve PR
        id: guards
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels -q '[.labels[].name] | join(",")')

          if echo "$LABELS" | grep -q 'auto-fix-attempted'; then
            echo "Auto-fix already attempted. Use /agent on the PR for another pass."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_JSON=$(gh api "/repos/${REPO}/pulls?state=open&per_page=100" \
            --jq "[.[] | select(
              ((.body // \"\") | test(\"#[[:space:]]*${ISSUE_NUMBER}([^0-9]|$)\")) or
              ((.title // \"\") | test(\"#[[:space:]]*${ISSUE_NUMBER}([^0-9]|$)\"))
            )] | first")

          if [ "$PR_JSON" = "null" ] || [ -z "$PR_JSON" ]; then
            echo "::error::No open PR linked to issue #${ISSUE_NUMBER}"
            exit 1
          fi

          echo "pr_number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"

          gh label create auto-fix-attempted --description "One automatic /agent fix pass used" --color "E99695" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label auto-fix-attempted

      - name: Check CURSOR_API_KEY
        if: steps.guards.outputs.skip != 'true'
        run: |
          if [ -z "${{ secrets.CURSOR_API_KEY }}" ]; then
            echo "::error::CURSOR_API_KEY required for auto-fix"
            exit 1
          fi

      - name: Setup Node
        if: steps.guards.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.guards.outputs.skip != 'true'
        run: npm ci

      - name: Dispatch cloud auto-fix agent
        if: steps.guards.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.guards.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: node scripts/dispatch-pr-cloud-fix.mjs

      - name: Notify issue
        if: steps.guards.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.guards.outputs.pr_number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "🔧 **Auto-fix agent dispatched** for PR #${PR_NUMBER} (one attempt). Re-run reviews after push; use \`/agent\` on the PR if more fixes are needed."
