server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (HSTS belongs on the TLS terminator if HTTPS terminates upstream).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https: wss:; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/manifest+json;

    # Hashed Vite JS/CSS only — filenames change each deploy.
    location ~* ^/assets/.+\-[A-Za-z0-9_-]+\.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Stable-name assets (e.g. PNGs copied into dist/assets/) — revalidate on deploy.
    location /assets/ {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
    }

    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
    }

    location = /registerSW.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
    }

    location /workbox- {
        default_type application/javascript;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    }
}
