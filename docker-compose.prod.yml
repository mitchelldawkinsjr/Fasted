# Production stack (VPS): static PWA + PocketBase for optional cloud sync.
# Joins `fasted-network` so NPM can reach containers by name.
#
# Prerequisites: docker network create fasted-network (see scripts/vps-bootstrap.sh)
# Deploy path: /opt/apps/fasted-calendar
#
# NPM Proxy Hosts:
#   app.example.com      → http://fasted-calendar-app:80
#   api.app.example.com  → http://fasted-calendar-pocketbase:8090

name: fasted-calendar

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_POCKETBASE_URL: ${VITE_POCKETBASE_URL:-https://api.app.example.com}
    container_name: fasted-calendar-app
    restart: unless-stopped
    ports:
      - "${APP_PUBLISH_PORT:-8022}:80"
    networks:
      - proxy
    labels:
      - "com.fasted.app=fasted-calendar"
      - "com.fasted.type=docker-app"
      - "com.fasted.service=app"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: fasted-calendar-pocketbase
    restart: unless-stopped
    ports:
      - "${POCKETBASE_PUBLISH_PORT:-8023}:8090"
    volumes:
      - pocketbase-data:/pb_data
      - ./docker/pb_migrations:/pb_migrations:ro
    networks:
      - proxy
    labels:
      - "com.fasted.app=fasted-calendar"
      - "com.fasted.type=docker-app"
      - "com.fasted.service=pocketbase"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  proxy:
    external: true
    name: fasted-network

volumes:
  pocketbase-data:
