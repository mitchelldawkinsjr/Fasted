# Production stack (VPS): static PWA + optional Supabase cloud sync.
# Joins `fasted-network` so the reverse proxy can reach containers by name.
#
# Prerequisites: docker network create fasted-network (see scripts/vps-bootstrap.sh)
# Deploy path: /opt/apps/fasted-calendar (override with DEPLOY_DIR)
# Supabase stack: /opt/apps/supabase (see scripts/setup-supabase-vps.sh)
#
# Reverse proxy examples:
#   app.example.com  → http://fasted-calendar-app:80
#   api.example.com  → http://supabase-kong:8000

name: fasted-calendar

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: fasted-calendar-app
    restart: unless-stopped
    ports:
      - "${APP_PUBLISH_PORT:-8022}:80"
    networks:
      - proxy
    labels:
      - "com.fasted.app=fasted-calendar"
      - "com.fasted.type=docker-app"
      - "com.fasted.service=app"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  proxy:
    external: true
    name: fasted-network
