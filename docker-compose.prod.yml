# Production stack (VPS): static PWA + optional Supabase cloud sync.
# Joins `360ws-network` so NPM can reach containers by name.
#
# Prerequisites: docker network create 360ws-network (see scripts/vps-bootstrap.sh)
# Deploy path: /opt/360ws/clients/docker-app/fasted-calendar
# Supabase stack: /opt/360ws/clients/docker-app/supabase (see scripts/setup-supabase-vps.sh)
#
# NPM Proxy Hosts:
#   fasted.360web.cloud      → http://fasted-calendar-app:80
#   db.fasted.360web.cloud   → http://supabase-kong:8000

name: fasted-calendar

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://db.fasted.360web.cloud}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: fasted-calendar-app
    restart: unless-stopped
    ports:
      - "${APP_PUBLISH_PORT:-8022}:80"
    networks:
      - proxy
    labels:
      - "com.360ws.app=fasted-calendar"
      - "com.360ws.type=docker-app"
      - "com.360ws.service=app"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # PocketBase — commented out during Supabase cutover; kept for rollback.
  # Uncomment and stop pointing app at Supabase to revert in an emergency.
  # pocketbase:
  #   image: ghcr.io/muchobien/pocketbase:latest
  #   container_name: fasted-calendar-pocketbase
  #   restart: unless-stopped
  #   ports:
  #     - "${POCKETBASE_PUBLISH_PORT:-8023}:8090"
  #   volumes:
  #     - pocketbase-data:/pb_data
  #     - ./docker/pb_migrations:/pb_migrations:ro
  #   networks:
  #     - proxy
  #   labels:
  #     - "com.360ws.app=fasted-calendar"
  #     - "com.360ws.type=docker-app"
  #     - "com.360ws.service=pocketbase"
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 20s

networks:
  proxy:
    external: true
    name: 360ws-network

volumes:
  pocketbase-data:
